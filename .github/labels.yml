# Environment Labels
- name: "env: sandbox"
  color: "bfdadc"
  description: "Sandbox environment"

- name: "env: staging"
  color: "fbca04"
  description: "Staging environment"

- name: "env: production"
  color: "d73a4a"
  description: "Production environment"

# Workflow/Process Labels
- name: "needs: design"
  color: "e99695"
  description: "Needs design work"

- name: "needs: api"
  color: "0075ca"
  description: "Needs API changes"

- name: "needs: tests"
  color: "1d76db"
  description: "Needs test coverage"

- name: "ready to merge"
  color: "0e8a16"
  description: "Approved and ready to merge"
