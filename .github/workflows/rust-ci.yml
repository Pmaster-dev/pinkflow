nname: Rust Core CI & Gateway Delivery

on:
  push:
    branches: [ "main" ]
    paths:
      - 'create-mbtq-template/packages/core/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'create-mbtq-template/packages/core/**'
      - '.github/workflows/rust-ci.yml'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: pinkflow-core-gateway

jobs:
  quality-gate:
    name: Rust Quality & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-mbtq-template/packages/core

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: clippy, rustfmt

      - name: Cargo Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "create-mbtq-template/packages/core -> target"

      - name: Check Formatting
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: Run Clippy (Linter)
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --all-targets --all-features -- -D warnings

      - name: Run Tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --verbose

      - name: Generate Documentation
        uses: actions-rs/cargo@v1
        with:
          command: doc
          args: --no-deps --all-features

      - name: Archive Documentation
        uses: actions/upload-artifact@v6
        with:
          name: core-api-docs
          path: create-mbtq-template/packages/core/target/doc

  dockerize:
    name: Dockerize for PinkSync Gateway
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Core Gateway Image
        uses: docker/build-push-action@v6
        with:
          context: create-mbtq-template/packages/core
          file: create-mbtq-template/packages/core/Dockerfile
          push: false # Set to true once secrets/registry are configured
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=PinkSync Core Gateway
            org.opencontainers.image.description=High-performance Rust module for MBTQ ecosystem
            org.mbtq.protocol.version=v4.1
            org.mbtq.status=READY_FOR_GATEWAY

  gateway-readiness:
    name: Gateway Readiness Audit
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Generate Readiness Signal
        run: |
          echo "CORE_VERSION=v4.1-$(date +%Y%m%d)" > readiness.env
          echo "QUALITY_STATUS=PASSED" >> readiness.env
          echo "GATEWAY_TARGET=PinkSync-v2" >> readiness.env
      
      - name: Upload Readiness Signal
        uses: actions/upload-artifact@v6
        with:
          name: gateway-readiness-signal
          path: readiness.env
