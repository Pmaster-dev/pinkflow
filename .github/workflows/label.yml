# This workflow will triage pull requests and apply a label based on the
# paths that are modified in the pull request.
#
# To use this workflow, you will need to set up a .github/labeler.yml
# file with configuration.  For more information, see:
# https://github.com/actions/labeler

name: Labeler
on: [pull_request_target]

jobs:
  label:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Fetch labeler config from pull request
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const fs = require('fs');
            const path = require('path');
            const configPath = '.github/labeler.yml';
            const pullRequest = context.payload.pull_request;
            const headRepo = pullRequest.head.repo;
            const sources = [
              ...(headRepo ? [{
                owner: headRepo.owner.login,
                repo: headRepo.name,
                ref: pullRequest.head.sha,
              }] : []),
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pullRequest.base.sha,
              },
            ];

            let configContent;

            for (const source of sources) {
              try {
                const response = await github.rest.repos.getContent({
                  owner: source.owner,
                  repo: source.repo,
                  path: configPath,
                  ref: source.ref,
                });

                if (Array.isArray(response.data) || response.data.type !== 'file' || !response.data.content) {
                  const reason = Array.isArray(response.data)
                    ? 'received a directory listing'
                    : response.data.type !== 'file'
                      ? `received type "${response.data.type}"`
                      : 'received empty file content';
                  throw new Error(`Unable to read ${configPath} at ${source.owner}/${source.repo}@${source.ref}: ${reason}.`);
                }

                configContent = Buffer.from(response.data.content, response.data.encoding).toString('utf8');
                break;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (!configContent) {
              core.setFailed(`Unable to load ${configPath} from the pull request head or base branch.`);
              return;
            }

            fs.mkdirSync(path.dirname(configPath), { recursive: true });
            fs.writeFileSync(configPath, configContent);

      - uses: actions/labeler@v4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
